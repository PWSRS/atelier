{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Atelier - Faby Panos & Arte</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <style>
        /* Estilo para o Nome na Navbar */
        .brand-text {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: #4a3728 !important; /* Marrom artesanal */
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-decoration: none; /* Remove sublinhado de link */
        }

        .brand-text:hover {
            color: #bc9c82 !important; /* Tom de linho */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Alinhamento Vertical da Logo + Texto */
        .navbar-brand {
            display: flex;
            align-items: center;
        }

        /* Ajuste extra para a imagem da logo */
        .logo-img {
            object-fit: cover;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand brand-text" href="{% url 'atelier:lista_produtos' %}">
                <img src="{% static 'atelier/img/logo_nav_atelier.jpg' %}" width="30" height="30" 
                    class="d-inline-block align-top me-1 rounded-circle border border-1">
                <span class="ms-1">Faby Panos & Arte</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'atelier:lista_produtos' %}">
                            <i class="fas fa-box-open me-1"></i>Produtos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'atelier:lista_materiais' %}">
                            <i class="fas fa-warehouse me-1"></i>Estoque
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'atelier:lista_clientes' %}">
                            <i class="fas fa-users me-1"></i>Clientes
                        </a>
                    </li>
                </ul>
                
                <div class="d-flex">
                    <a href="{% url 'atelier:criar_produto' %}" class="btn btn-primary btn-sm me-2">
                        <i class="fas fa-plus me-1"></i>Novo Produto
                    </a>
                    <a href="{% url 'atelier:cadastrar_cliente' %}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-user-plus me-1"></i>Novo Cliente
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
